<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe6f0, #fff);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            color: #ff4d6d;
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        .buttons {
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .ok {
            background-color: #ff4d6d;
            color: white;
        }

        .angry {
            background-color: #555;
            color: white;
        }

        button:hover {
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .emoji {
            position: absolute;
            font-size: 24px;
            animation: floatUp 2s linear forwards;
        }

        @keyframes floatUp {
            from {
                transform: translateY(0);
                opacity: 1;
            }
            to {
                transform: translateY(-150px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <h1>Sorry, I love you kanna ❤️</h1>

    <div class="buttons">
        <button class="ok" onclick="showKiss()">It's ok ma...</button>
        <button class="angry" onclick="showSad()">Go to hell..!!</button>
    </div>

    <!-- Music -->
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Play music on first click anywhere
        document.body.addEventListener("click", function () {
            document.getElementById("bg-music").play();
        }, { once: true });

        function createEmoji(emoji) {
            const el = document.createElement("div");
            el.className = "emoji";
            el.innerText = emoji;
            el.style.left = Math.random() * window.innerWidth + "px";
            el.style.top = Math.random() * window.innerHeight + "px";
            document.body.appendChild(el);

            setTimeout(() => {
                el.remove();
            }, 2000);
        }

        function showKiss() {
            for (let i = 0; i < 20; i++) {
                createEmoji("💋");
            }
        }

        function showSad() {
            for (let i = 0; i < 20; i++) {
                createEmoji("😢");
            }
        }
    </script>

</body>
</html>

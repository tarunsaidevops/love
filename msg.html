<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffe6f0, #fff);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            color: #ff4d6d;
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        .buttons {
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            margin: 10px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.2s;
        }

        .ok {
            background-color: #ff4d6d;
            color: white;
        }

        .angry {
            background-color: #444;
            color: white;
        }

        button:hover {
            transform: scale(1.1);
        }

        button:active {
            transform: scale(0.95);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .emoji {
            position: absolute;
            font-size: 26px;
            animation: floatUp 2s ease-out forwards;
        }

        @keyframes floatUp {
            from {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            to {
                transform: translateY(-200px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <h1>Thought you might open this again, I miss you already.(we just had call 11:35 AM, 16/4/2025) ❤️</h1>

    <div class="buttons">
        <button class="ok" onclick="showKiss()">I miss you too ma</button>
        <button class="angry" onclick="showSad()">po ra pandhi..!!</button>
    </div>

    <!-- Music -->
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Play music on first interaction
        document.body.addEventListener("click", function () {
            document.getElementById("bg-music").play().catch(() => {});
        }, { once: true });

        function createEmoji(emoji) {
            const el = document.createElement("div");
            el.className = "emoji";
            el.innerText = emoji;

            el.style.left = Math.random() * window.innerWidth + "px";
            el.style.top = (window.innerHeight - 100) + "px";

            document.body.appendChild(el);

            setTimeout(() => {
                el.remove();
            }, 2000);
        }

        function showKiss() {
            const emojis = ["💋", "❤️", "😘", "😍"];
            for (let i = 0; i < 25; i++) {
                createEmoji(emojis[Math.floor(Math.random() * emojis.length)]);
            }
        }

        function showSad() {
            const emojis = ["😢", "😭", "💔", "🥺"];
            for (let i = 0; i < 25; i++) {
                createEmoji(emojis[Math.floor(Math.random() * emojis.length)]);
            }
        }
    </script>

</body>
</html>
